version: "3.9"

services:
  ppe-api:
    build: .
    container_name: smartx-ppe-detection
    ports:
      - "80:8080"
    volumes:
      # Persiste o modelo baixado (evita re-download a cada restart)
      - ppe_models:/app/models
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - MODEL_CONFIDENCE=0.45
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  ppe_models:
